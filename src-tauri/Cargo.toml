[package]
name = "ordning"
version = "0.1.0"
description = "Ordning calendar app"
authors = ["you"]
edition = "2021"

[lib]
name = "ordning_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.0", features = [] }

[features]
custom-protocol = ["tauri/custom-protocol"]
